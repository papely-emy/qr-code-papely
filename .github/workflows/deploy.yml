name: Deploy Kubernetes

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
      
      - name: Add kubectl to PATH
        run: echo "$PWD" >> $GITHUB_PATH
        
      - name: Debug Kustomize
        run: kubectl kustomize k8s/overlays/dev

      - name: Deploy
        run: kubectl apply -k k8s/overlays/dev

      - name: Restart deployment (garantir update)
        run: |
          kubectl rollout restart deployment papely -n papely-qrcode