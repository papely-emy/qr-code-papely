<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Papely - QR Code</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: url("background.jpg") no-repeat center center;
  background-size: cover;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(255, 192, 203, 0.25);
  top: 0;
  left: 0;
}

/* container */
.container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 400px;
}

/* card */
.card {
  backdrop-filter: blur(8px); /* 🔥 reduzido */
  background: rgba(255,255,255,0.8);
  border-radius: 20px;
  padding: 20px;
  text-align: center;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}

/* textos */
.logo {
  font-size: 28px;
  font-weight: bold;
  color: #d81b60;
}

.subtitle {
  color: #880e4f;
  font-size: 13px;
  margin-bottom: 15px;
}

/* inputs */
input {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 10px;
  border: none;
  outline: none;
  box-sizing: border-box;
}

button {
  width: 100%;
  background: linear-gradient(45deg, #ec407a, #d81b60);
  color: white;
  border: none;
  padding: 14px;
  font-size: 15px;
  margin-top: 8px;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

canvas {
  margin-top: 15px;
  width: 100%;
  max-width: 260px;
  aspect-ratio: 1/1;
  background: white;
  padding: 10px;
  border-radius: 12px;
}

.footer {
  margin-top: 10px;
  font-size: 11px;
  color: #880e4f;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="logo">💗 Papely</div>
    <div class="subtitle">Gerador de QR Code</div>

    <input id="url" placeholder="Cole seu link aqui ✨">
    <input id="filename" placeholder="Nome do arquivo 💾">

    <label style="font-size:12px; color:#880e4f;">Cor do QR 🎨</label>
    <input type="color" id="color" value="#d81b60">

    <input type="file" id="pdf" accept="application/pdf">

    <button id="uploadBtn" onclick="uploadPDF()">Enviar PDF 📄</button>
    <button onclick="gerar()">Gerar QR</button>
    <button onclick="baixar()">Baixar QR</button>

    <canvas id="qrcode"></canvas>

    <div class="footer">Feito com amor 💖</div>

  </div>
</div>

<script>
// cache de elementos (🔥 melhora performance)
const urlInput = document.getElementById("url");
const colorInput = document.getElementById("color");
const canvas = document.getElementById("qrcode");
const uploadBtn = document.getElementById("uploadBtn");

// 🎯 GERAR QR (não trava UI)
function gerar() {
  let url = urlInput.value.trim();
  const color = colorInput.value;

  if (!url) {
    alert("Coloca um link 😅");
    return;
  }

  if (!url.startsWith("http")) {
    url = "https://" + url;
  }

  try {
    new URL(url);
  } catch {
    alert("URL inválida 😕");
    return;
  }

  // joga pra thread livre (🔥)
  setTimeout(() => {
    QRCode.toCanvas(canvas, url, {
      width: 260,
      margin: 2,
      color: {
        dark: color,
        light: "#ffffff"
      }
    });
  }, 0);
}

// 📄 UPLOAD PDF
async function uploadPDF() {
  const file = document.getElementById("pdf").files[0];

  if (!file) {
    alert("Escolhe um PDF 😅");
    return;
  }

  uploadBtn.innerText = "Enviando... ⏳";
  uploadBtn.disabled = true;

  try {
    const formData = new FormData();
    formData.append("file", file);

    const res = await fetch("/upload", {
      method: "POST",
      body: formData
    });

    if (!res.ok) {
      throw new Error("Erro no upload");
    }

    const data = await res.json();

    urlInput.value = data.url;

    gerar();

    alert("PDF enviado 🚀");

  } catch (err) {
    alert("Erro: " + err.message);
  } finally {
    uploadBtn.innerText = "Enviar PDF 📄";
    uploadBtn.disabled = false;
  }
}

// 💾 BAIXAR
function baixar() {
  const filename = document.getElementById("filename").value || "papely_qrcode";

  const link = document.createElement("a");
  link.download = filename + ".png";
  link.href = canvas.toDataURL();
  link.click();
}
</script>

</body>
</html>
