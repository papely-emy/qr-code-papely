<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Papely - QR Code</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;

  background: url("background.jpg") no-repeat center center;
  background-size: cover;

  display: flex;
  justify-content: center;
  align-items: center;

  min-height: 100vh; /* 🔥 melhor que height */
  padding: 20px;
}

/* overlay */
body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(255, 192, 203, 0.3);
  top: 0;
  left: 0;
}

/* container */
.container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 400px;
}

/* card */
.card {
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.75);
  border-radius: 20px;
  padding: 20px;
  text-align: center;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}

/* textos */
.logo {
  font-size: 28px;
  font-weight: bold;
  color: #d81b60;
}

.subtitle {
  color: #880e4f;
  font-size: 13px;
  margin-bottom: 15px;
}

/* inputs */
input {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 10px;
  border: none;
  outline: none;
  box-sizing: border-box;
}

/* botões mobile friendly */
button {
  width: 100%;
  background: linear-gradient(45deg, #ec407a, #d81b60);
  color: white;
  border: none;
  padding: 12px;
  margin-top: 8px;
  border-radius: 10px;
  font-weight: bold;
}

/* QR responsivo */
canvas {
  margin-top: 15px;
  width: 100%;
  max-width: 260px;
  height: auto;
  background: white;
  padding: 10px;
  border-radius: 12px;
}

/* footer */
.footer {
  margin-top: 10px;
  font-size: 11px;
  color: #880e4f;
}

/* glitter leve */
.sparkle {
  position: fixed;
  top: -20px;
  font-size: 12px;
  animation: fall 4s linear forwards;
  opacity: 0.7;
  z-index: 0;
}

@keyframes fall {
  to {
    transform: translateY(100vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="logo">💗 Papely</div>
    <div class="subtitle">Gerador de QR Code</div>

    <input id="url" placeholder="Cole seu link aqui ✨" oninput="gerar()">
    <input id="filename" placeholder="Nome do arquivo 💾">

    <button onclick="gerar()">Gerar QR</button>
    <button onclick="baixar()">Baixar QR</button>

    <canvas id="qrcode"></canvas>

    <div class="footer">Feito com amor 💖</div>

  </div>
</div>

<script>
function gerar() {
  let url = document.getElementById("url").value.trim();

  if (!url) return;

  if (!url.startsWith("http://") && !url.startsWith("https://")) {
    url = "https://" + url;
  }

  try {
    new URL(url);
  } catch {
    return;
  }

  QRCode.toCanvas(document.getElementById("qrcode"), url, {
    width: 260,
    margin: 2,
    color: {
      dark: "#d81b60",
      light: "#ffffff"
    }
  });
}

function baixar() {
  const canvas = document.getElementById("qrcode");
  const filename = document.getElementById("filename").value || "papely_qrcode";

  const link = document.createElement("a");
  link.download = filename + ".png";
  link.href = canvas.toDataURL();
  link.click();
}

/* glitter fundo */
const bgGlitter = ["✨","⭐","✦"];

setInterval(() => {
  const sparkle = document.createElement("div");
  sparkle.className = "sparkle";
  sparkle.innerHTML = bgGlitter[Math.floor(Math.random() * bgGlitter.length)];

  sparkle.style.left = Math.random() * window.innerWidth + "px";

  document.body.appendChild(sparkle);

  setTimeout(() => sparkle.remove(), 4000);
}, 500);
</script>

</body>
</html>
